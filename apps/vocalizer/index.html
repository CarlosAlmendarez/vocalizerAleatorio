<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vocalizer - MusicTools</title>
    <script src="https://cdn.jsdelivr.net/npm/soundfont-player/dist/soundfont-player.js"></script>
    <script src="../../shared/sound-engine.js"></script>
    <link rel="stylesheet" href="../../shared/design.css">
    <style>
        /* ── Layout root ─────────────────────────── */
        .voc-screen {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 12px 0 200px;   /* space for floating transport */
            color: var(--ink);
        }

        /* ── Giant note display ──────────────────── */
        .voc-hero {
            text-align: center;
            padding-top: 4px;
        }
        .voc-note-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .voc-note-big {
            font-family: var(--font-head);
            font-size: clamp(80px, 22vw, 120px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            color: var(--ink);
            text-shadow: none;
            transition: color 0.25s ease, text-shadow 0.25s ease;
            font-variant-numeric: tabular-nums;
        }
        .voc-note-big.playing {
            color: var(--accent);
            text-shadow: var(--accent-glow);
        }
        .voc-vocal-row {
            font-size: 16px;
            color: var(--ink-dim);
            margin-top: 6px;
            font-weight: 500;
        }
        .voc-vocal-row span {
            font-family: var(--font-head);
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            transition: color 0.2s;
        }
        .voc-progress-tag {
            display: inline-block;
            margin-top: 8px;
            font-size: 11px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        /* ── Radial SVG display ──────────────────── */
        .voc-radial-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .voc-radial-wrap svg {
            max-width: 300px;
            width: 100%;
        }

        /* ── Stepper display ─────────────────────── */
        .voc-stepper {
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .voc-step {
            width: 36px;
            height: 52px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-head);
            font-size: 11px;
            font-weight: 700;
            transition: all 0.22s ease;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
        }
        .voc-step.played {
            background: var(--surface-s);
            color: var(--ink);
        }
        .voc-step.active {
            background: var(--accent);
            color: var(--accent-ink);
            border-color: transparent;
            box-shadow: var(--accent-shadow);
            transform: translateY(-6px);
        }

        /* ── Layout toggle pills ─────────────────── */
        .voc-layout-toggle {
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .voc-layout-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all 0.15s;
        }
        .voc-layout-btn.active {
            background: rgba(var(--accent-rgb), 0.16);
            border-color: rgba(var(--accent-rgb), 0.35);
            color: var(--accent);
        }

        /* ── Config chips grid (2×2) ─────────────── */
        .voc-chips {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .voc-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-radius: var(--radius-sm);
            background: var(--surface);
            border: 1px solid var(--border);
            -webkit-backdrop-filter: blur(18px);
            backdrop-filter: blur(18px);
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            position: relative;
        }
        .voc-chip:hover {
            background: var(--surface-s);
            border-color: rgba(var(--accent-rgb), 0.25);
        }
        .voc-chip-icon {
            width: 34px; height: 34px;
            border-radius: 9px;
            background: rgba(var(--accent-rgb), 0.14);
            border: 1px solid rgba(var(--accent-rgb), 0.25);
            color: var(--accent);
            display: grid; place-items: center;
            flex-shrink: 0;
        }
        .voc-chip-label {
            font-size: 9px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .voc-chip-val {
            font-family: var(--font-head);
            font-size: 13px;
            font-weight: 700;
            color: var(--ink);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Config panel (expandable) ───────────── */
        .voc-config-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: var(--radius-pill);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--ink-dim);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all 0.15s;
            margin: 0 auto;
        }
        .voc-config-toggle:hover {
            background: var(--surface-s);
            color: var(--ink);
        }
        .voc-config-toggle svg {
            transition: transform 0.25s;
        }
        .voc-config-toggle.open svg {
            transform: rotate(180deg);
        }

        .voc-config-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .voc-config-panel.open {
            display: flex;
        }

        .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        input[type="range"] { width: 100%; margin-top: 6px; accent-color: var(--accent); }

        /* ── Floating transport bar ──────────────── */
        .voc-transport {
            position: fixed;
            bottom: calc(var(--bottomnav-h) + 12px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 20px;
            border-radius: 999px;
            background: var(--nav-bg);
            -webkit-backdrop-filter: blur(26px);
            backdrop-filter: blur(26px);
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        @media (min-width: 960px) {
            .voc-transport {
                position: static;
                transform: none;
                background: transparent;
                border: none;
                box-shadow: none;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                justify-content: center;
                padding: 0;
                margin-top: 4px;
            }
        }

        .voc-play-btn {
            width: 84px; height: 84px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: var(--accent-ink);
            border: none;
            cursor: pointer;
            display: grid;
            place-items: center;
            box-shadow: var(--accent-shadow);
            transition: transform 0.12s, box-shadow 0.2s;
            flex-shrink: 0;
        }
        .voc-play-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--accent-glow), var(--accent-shadow);
        }
        .voc-play-btn:active { transform: scale(0.95); }

        .voc-play-btn.loading {
            opacity: 0.7;
            cursor: wait;
        }
        .voc-play-btn.stop-mode {
            background: linear-gradient(135deg, var(--danger), #ff3366);
            box-shadow: 0 12px 30px -8px rgba(255,91,127,0.7), inset 0 1px 0 rgba(255,255,255,0.25);
        }

        .voc-side-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--surface-s);
            border: 1px solid var(--border);
            color: var(--ink);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.12s;
            flex-shrink: 0;
        }
        .voc-side-btn:hover {
            background: var(--surface-ss);
            border-color: rgba(var(--accent-rgb), 0.3);
            color: var(--accent);
        }
        .voc-side-btn:active { transform: scale(0.95); }
        .voc-side-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body data-tool-name="Vocalizer" data-page-id="vocalizer">

<div class="voc-screen">

    <!-- ── Giant note display ── -->
    <div class="voc-hero">
        <div class="voc-note-label">Nota actual</div>
        <div class="voc-note-big" id="currentNote">—</div>
        <div class="voc-vocal-row">
            Vocal · <span id="currentVowel">—</span>
        </div>
        <div class="voc-progress-tag" id="progressInfo">Selecciona y presiona ▶</div>
    </div>

    <!-- ── Layout toggle ── -->
    <div class="voc-layout-toggle">
        <button class="voc-layout-btn active" id="btnRadial" onclick="setLayout('radial')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
            Radial
        </button>
        <button class="voc-layout-btn" id="btnStepper" onclick="setLayout('stepper')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="8" width="4" height="8" rx="1"/><rect x="8" y="5" width="4" height="11" rx="1"/><rect x="14" y="8" width="4" height="8" rx="1"/><rect x="20" y="10" width="2" height="6" rx="1"/></svg>
            Pasos

    </div>

    <!-- ── Radial SVG display ── -->
    <div class="voc-radial-wrap" id="radialWrap">
        <svg id="radialSvg" viewBox="0 0 300 300" width="300" height="300"></svg>
    </div>

    <!-- ── Stepper display (hidden by default) ── -->
    <div class="voc-stepper" id="stepperWrap" style="display:none;"></div>

    <!-- ── Config chips (2×2) ── -->
    <div class="voc-chips" onclick="toggleConfig()">
        <div class="voc-chip">
            <div class="voc-chip-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
            </div>
            <div>
                <div class="voc-chip-label">Tesitura</div>
                <div class="voc-chip-val" id="chipTesitura">Soprano</div>
            </div>
        </div>
        <div class="voc-chip">
            <div class="voc-chip-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 12h2l2-6 3 12 3-9 2 3h3"/></svg>
            </div>
            <div>
                <div class="voc-chip-label">Patrón</div>
                <div class="voc-chip-val" id="chipPattern">Tríada</div>
            </div>
        </div>
        <div class="voc-chip">
            <div class="voc-chip-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3h8l3 18H5z"/><path d="M13 21 9 7"/></svg>
            </div>
            <div>
                <div class="voc-chip-label">BPM</div>
                <div class="voc-chip-val" id="chipBpm">100</div>
            </div>
        </div>
        <div class="voc-chip">
            <div class="voc-chip-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 18V8l3 10M4 14h4M10 8v10c0 0 4 0 4-2s-4-1-4-1c0 0 4 0 4-2s-4-2-4-2M17 13a2 2 0 1 1 4 0v2a2 2 0 1 1-4 0z"/></svg>
            </div>
            <div>
                <div class="voc-chip-label">Vocales</div>
                <div class="voc-chip-val" id="chipVowels">Ma·Me·Mi</div>

    <!-- ── Config toggle ── -->
    <button class="voc-config-toggle" id="configToggle" onclick="toggleConfig()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Configurar ejercicio
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>

    <!-- ── Config panel ── -->
    <div class="voc-config-panel" id="configPanel">

        <div class="section-card">
            <div class="section-title">Tesitura</div>
            <div class="preset-grid">
                <button class="btn-mini" onclick="setVoicePreset('soprano')">Soprano</button>
                <button class="btn-mini" onclick="setVoicePreset('mezzosoprano')">Mezzo</button>
                <button class="btn-mini" onclick="setVoicePreset('alto')">Alto</button>
                <button class="btn-mini" onclick="setVoicePreset('tenor')">Tenor</button>
                <button class="btn-mini" onclick="setVoicePreset('baritone')">Barítono</button>
                <button class="btn-mini" onclick="setVoicePreset('bass')">Bajo</button>
            </div>
            <div class="grid-2" style="margin-top:10px">
                <div><label>Inicio</label><select id="startNote"></select></div>
                <div><label>Fin</label><select id="endNote"></select></div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Ejercicio</div>
            <label>Tipo de patrón</label>
            <select id="pattern" onchange="updateChips()">
                <option value="scale">Escala Lineal</option>
                <option value="triad" selected>Tríada (I-III-V-III-I)</option>
                <option value="octave">Octava (I-V-VIII-V-I)</option>
                <option value="arpeggio">Arpegio (I-III-V-VIII-V-III-I)</option>
                <option value="messa">Messa di Voce (Sostenido)</option>
            </select>
            <div id="scaleGroup" style="margin-top:10px">
                <label>Escala</label>
                <select id="scale">
                    <option value="major">Mayor</option>
                    <option value="minor">Menor</option>
                </select>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Vocales</div>
            <select id="vowelPattern" onchange="updateChips()">
                <option value="a">Solo A</option>
                <option value="aeiou">A - E - I - O - U</option>
                <option value="mama" selected>Ma - Me - Mi - Mo - Mu</option>
            </select>
        </div>

        <div class="section-card">
            <div class="section-title">Ajustes</div>
            <label>Modo</label>
            <select id="practiceMode">
                <option value="single">Tocar una vez</option>
                <option value="loop">Subir Automático</option>
                <option value="loop-desc">Bajar Automático</option>
                <option value="cycle">Cíclico (↑↓ infinito)</option>
            </select>
            <div class="grid-2" style="margin-top:10px">
                <div>
                    <label>BPM: <span id="bpmVal">100</span></label>
                    <input type="range" id="tempo" min="60" max="180" value="100">
                </div>
                <div>
                    <label>Metrónomo</label>
                    <div class="toggle-row">
                        <button class="toggle-btn active" id="mOff" onclick="setMet(false)">Off</button>
                        <button class="toggle-btn" id="mOn" onclick="setMet(true)">On</button>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /config panel -->

</div><!-- /voc-screen -->

<!-- ── Floating transport ── -->
<div class="voc-transport">
    <button class="voc-side-btn" id="prevBtn" onclick="shiftNote(-1)" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v14M18 5 8 12l10 7z"/></svg>
    </button>

    <button class="voc-play-btn" id="playBtn" onclick="handlePlayBtn()">
        <svg id="playIcon" width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="m8 5 12 7-12 7z"/></svg>
    </button>

    <button class="voc-side-btn" id="nextBtn" onclick="shiftNote(1)" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18 5v14M6 5l10 7L6 19z"/></svg>
    </button>
</div>

<script src="../../shared/audio-utils.js"></script>
<script>
/* ════════════════════════════════════════════════════
   DATOS
   ════════════════════════════════════════════════════ */
const notes = getAllNotes(2, 6);
const scales = {
    major: [0,2,4,5,7,9,11,12],
    minor: [0,2,3,5,7,8,10,12]
};
const patterns = {
    scale:   [0,1,2,3,4,5,6,7,6,5,4,3,2,1,0],
    triad:   [0,2,4,2,0],
    octave:  [0,4,7,4,0],
    arpeggio:[0,2,4,7,4,2,0],
    messa:   [0]
};
const vowelSets = {
    a:    ['A'],
    aeiou:['A','E','I','O','U'],
    mama: ['Ma','Me','Mi','Mo','Mu']
};
const voicePresets = {
    soprano:      ['C4','C6'], mezzosoprano:['A3','A5'], alto:['F3','F5'],
    tenor:        ['C3','C5'], baritone:    ['G2','G4'], bass:['E2','E4']
};
const patternLabels = {
    scale:'Escala', triad:'Tríada', octave:'Octava', arpeggio:'Arpegio', messa:'Messa'
};
const vowelLabels = {
    a:'Solo A', aeiou:'A·E·I·O·U', mama:'Ma·Me·Mi'
};

/* ════════════════════════════════════════════════════
   ESTADO
   ════════════════════════════════════════════════════ */
let isPlaying       = false;
let isLoading       = false;
let metEnabled      = false;
let pianoInst       = null;
let scheduledTimers = [];
let currentSequence = [];   // notes being played this sequence
let currentStepIdx  = -1;   // index in currentSequence
let currentLayout   = 'radial';
let currentPresetName = null; // set when a voice preset is active, null when custom range

/* ════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════ */
function init() {
    const s = document.getElementById('startNote');
    const e = document.getElementById('endNote');
    notes.forEach((n, i) => {
        s.options.add(new Option(n, i));
        e.options.add(new Option(n, i));
    });
    s.value = 24; e.value = 48;  // default C4 → C5
    s.onchange = () => { currentPresetName = null; updateChips(); };
    e.onchange = () => { currentPresetName = null; updateChips(); };

    document.getElementById('tempo').oninput = ev => {
        document.getElementById('bpmVal').innerText = ev.target.value;
        updateChips();
    };

    // Build initial radial with a preview sequence
    buildPreviewDisplay();
    updateChips();
}

/* ════════════════════════════════════════════════════
   LAYOUT SWITCH (Radial / Stepper)
   ════════════════════════════════════════════════════ */
function setLayout(layout) {
    currentLayout = layout;
    document.getElementById('btnRadial').classList.toggle('active',   layout === 'radial');
    document.getElementById('btnStepper').classList.toggle('active', layout === 'stepper');
    document.getElementById('radialWrap').style.display  = layout === 'radial'  ? 'flex' : 'none';
    document.getElementById('stepperWrap').style.display = layout === 'stepper' ? 'flex' : 'none';
    if (currentSequence.length) {
        renderDisplay(currentSequence, currentStepIdx);
    } else {
        buildPreviewDisplay();
    }
}

/* ════════════════════════════════════════════════════
   DISPLAY BUILDERS
   ════════════════════════════════════════════════════ */
function buildPreviewDisplay() {
    // Show a static preview (triads in C4) before exercise starts
    const preview = ['C4','E4','G4','E4','C4'];
    renderDisplay(preview, -1);
}

function renderDisplay(seq, activeIdx) {
    if (currentLayout === 'radial') {
        renderRadial(seq, activeIdx);
    } else {
        renderStepper(seq, activeIdx);
    }
}

/* ── Radial SVG ─────────────────────────────────── */
function renderRadial(seq, activeIdx) {
    const svg    = document.getElementById('radialSvg');
    const CX     = 150, CY = 150, R = 105;
    const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    const border = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
    const ink    = getComputedStyle(document.documentElement).getPropertyValue('--ink').trim();
    const muted  = getComputedStyle(document.documentElement).getPropertyValue('--muted').trim();
    const inkDim = getComputedStyle(document.documentElement).getPropertyValue('--ink-dim').trim();
    const accentInk = getComputedStyle(document.documentElement).getPropertyValue('--accent-ink').trim();
    const surface   = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim();

    // Unique set for display (remove duplicates keeping order)
    const unique = [...new Set(seq)];
    const n      = unique.length;

    let html = '';

    // Dashed orbit circle
    html += `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${border}" stroke-width="1" stroke-dasharray="3 5"/>`;

    // Center circle
    const centerNote = activeIdx >= 0 ? seq[activeIdx] : (unique[Math.floor(n/2)] || '—');
    html += `<circle cx="${CX}" cy="${CY}" r="52" fill="${surface}" stroke="${border}" stroke-width="1"/>`;
    html += `<text x="${CX}" y="${CY - 6}" text-anchor="middle" font-size="10" font-weight="700" fill="${muted}" letter-spacing="1.5" font-family="Inter,sans-serif">SUENA</text>`;
    html += `<text x="${CX}" y="${CY + 22}" text-anchor="middle" font-size="26" font-weight="800" fill="${accent}" font-family="var(--font-head, 'Space Grotesk', sans-serif)">${centerNote}</text>`;

    // Node for each unique note
    unique.forEach((note, i) => {
        const angle    = (i / n) * Math.PI * 2 - Math.PI / 2;
        const x        = CX + Math.cos(angle) * R;
        const y        = CY + Math.sin(angle) * R;
        const isActive = seq[activeIdx] === note;
        const playedIdx = activeIdx >= 0 ? seq.slice(0, activeIdx + 1).lastIndexOf(note) : -1;
        const isPlayed  = playedIdx >= 0 && !isActive;

        if (isActive) {
            // Halo
            html += `<circle cx="${x}" cy="${y}" r="26" fill="${accent}" opacity="0.2"/>`;
        }
        const r   = isActive ? 19 : 13;
        const bg  = isActive ? accent : isPlayed ? `rgba(${hexToRgb(accent)},0.15)` : 'none';
        const str = isActive ? 'none' : isPlayed ? `rgba(${hexToRgb(accent)},0.4)` : border;
        html += `<circle cx="${x}" cy="${y}" r="${r}" fill="${bg}" stroke="${str}" stroke-width="1.5"/>`;
        const textFill = isActive ? accentInk : isPlayed ? accent : muted;
        const fs = isActive ? '12' : '10';
        html += `<text x="${x}" y="${y + Number(fs)/2 - 1}" text-anchor="middle" font-size="${fs}" font-weight="700" fill="${textFill}" font-family="Inter,sans-serif">${note}</text>`;
    });

    svg.innerHTML = html;
}

/* ── Stepper ────────────────────────────────────── */
function renderStepper(seq, activeIdx) {
    const wrap = document.getElementById('stepperWrap');
    wrap.innerHTML = seq.map((note, i) => {
        let cls = 'voc-step';
        if (i === activeIdx) cls += ' active';
        else if (i < activeIdx) cls += ' played';
        return `<div class="${cls}">${note}</div>`;
    }).join('');
}

/* ── Helper ── */
function hexToRgb(hex) {
    const h = hex.replace('#','');
    const r = parseInt(h.slice(0,2),16);
    const g = parseInt(h.slice(2,4),16);
    const b = parseInt(h.slice(4,6),16);
    return `${r},${g},${b}`;
}

/* ════════════════════════════════════════════════════
   CONFIG CHIPS UPDATE
   ════════════════════════════════════════════════════ */
function buildTesituraLabel() {
    const startIdx  = parseInt(document.getElementById('startNote').value);
    const endIdx    = parseInt(document.getElementById('endNote').value);
    const startNote = notes[startIdx] || '—';
    const endNote   = notes[endIdx]   || '—';
    const semitones = Math.max(0, endIdx - startIdx);

    let octStr = '';
    if (semitones > 0) {
        const halves = Math.round(semitones / 6);
        if (halves > 0) {
            const full    = Math.floor(halves / 2);
            const hasHalf = (halves % 2) === 1;
            if (full === 0)     octStr = '½ oct';
            else if (!hasHalf)  octStr = full + ' oct';
            else                octStr = full + '½ oct';
        }
    }

    const range = `${startNote}–${endNote}`;
    if (currentPresetName) {
        return `${currentPresetName} · ${range}`;
    }
    return octStr ? `${range} (${octStr})` : range;
}

function updateChips() {
    const patternEl = document.getElementById('pattern');
    const vowelEl   = document.getElementById('vowelPattern');
    const bpmEl     = document.getElementById('tempo');

    document.getElementById('chipTesitura').textContent = buildTesituraLabel();
    document.getElementById('chipPattern').textContent  = patternLabels[patternEl.value] || patternEl.value;
    document.getElementById('chipBpm').textContent      = bpmEl.value + ' bpm';
    document.getElementById('chipVowels').textContent   = vowelLabels[vowelEl.value] || vowelEl.value;
}

/* ════════════════════════════════════════════════════
   CONFIG PANEL TOGGLE
   ════════════════════════════════════════════════════ */
function toggleConfig() {
    const panel  = document.getElementById('configPanel');
    const toggle = document.getElementById('configToggle');
    const open   = panel.classList.toggle('open');
    toggle.classList.toggle('open', open);
}

/* ════════════════════════════════════════════════════
   PRESETS
   ════════════════════════════════════════════════════ */
function setVoicePreset(v) {
    document.getElementById('startNote').value = notes.indexOf(voicePresets[v][0]);
    document.getElementById('endNote').value   = notes.indexOf(voicePresets[v][1]);
    const labels = { soprano:'Soprano', mezzosoprano:'Mezzo', alto:'Alto', tenor:'Tenor', baritone:'Barítono', bass:'Bajo' };
    currentPresetName = labels[v];
    updateChips();
}

function setMet(v) {
    metEnabled = v;
    document.getElementById('mOn').classList.toggle('active',  v);
    document.getElementById('mOff').classList.toggle('active', !v);
}

/* ════════════════════════════════════════════════════
   TRANSPORT — PLAY / STOP / SHIFT
   ════════════════════════════════════════════════════ */
function handlePlayBtn() {
    if (isLoading) return;
    if (isPlaying) {
        stopExercise();
    } else {
        startExercise();
    }
}

function setPlayBtnState(state) {
    const btn  = document.getElementById('playBtn');
    const icon = document.getElementById('playIcon');
    const prev = document.getElementById('prevBtn');
    const next = document.getElementById('nextBtn');

    btn.classList.remove('loading', 'stop-mode');
    if (state === 'loading') {
        btn.classList.add('loading');
        icon.innerHTML = '<circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="14" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle>';
        prev.disabled = true;
        next.disabled = true;
    } else if (state === 'stop') {
        btn.classList.add('stop-mode');
        icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
        prev.disabled = false;
        next.disabled = false;
    } else {
        // idle / play
        icon.innerHTML = '<path d="m8 5 12 7-12 7z"/>';
        prev.disabled = false;
        next.disabled = false;
    }
}

let currentBaseIdx = 0;
let currentConfig  = null;
let cycleDir       = 1;   // 1 = ascending, -1 = descending (used by cycle mode)

async function startExercise() {
    if (isPlaying || isLoading) return;

    isLoading = true;
    setPlayBtnState('loading');

    pianoInst = await soundEngine.get('acoustic_grand_piano');
    isLoading = false;

    if (!pianoInst) { setPlayBtnState('idle'); return; }

    isPlaying = true;
    setPlayBtnState('stop');

    // Mark hero as playing
    document.getElementById('currentNote').classList.add('playing');

    currentConfig = {
        start:   parseInt(document.getElementById('startNote').value),
        end:     parseInt(document.getElementById('endNote').value),
        pattern: document.getElementById('pattern').value,
        scale:   document.getElementById('scale').value,
        vowels:  document.getElementById('vowelPattern').value,
        mode:    document.getElementById('practiceMode').value,
        bpm:     parseInt(document.getElementById('tempo').value)
    };

    currentBaseIdx = currentConfig.start;
    cycleDir = 1;
    updateChips();
    runSequence(currentBaseIdx, currentConfig);
}

function stopExercise() {
    isPlaying = false;
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    if (pianoInst) pianoInst.stop();

    setPlayBtnState('idle');
    document.getElementById('currentNote').classList.remove('playing');
    document.getElementById('currentNote').innerText  = '—';
    document.getElementById('currentVowel').innerText = '—';
    document.getElementById('progressInfo').innerText = 'Ejercicio detenido';
    currentSequence = [];
    currentStepIdx  = -1;
    buildPreviewDisplay();
}

function shiftNote(delta) {
    if (!isPlaying || !currentConfig) return;
    const newIdx = currentBaseIdx + delta;
    if (newIdx < currentConfig.start || newIdx > currentConfig.end) return;

    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    if (pianoInst) pianoInst.stop();

    currentBaseIdx = newIdx;
    runSequence(currentBaseIdx, currentConfig);
}

function runSequence(baseNoteIdx, config) {
    if (!isPlaying) return;
    if (config.mode === 'loop'      && baseNoteIdx > config.end)   return stopExercise();
    if (config.mode === 'loop-desc' && baseNoteIdx < config.start) return stopExercise();

    const scaleInt      = scales[config.scale];
    const patternGrades = patterns[config.pattern];
    const vowelList     = vowelSets[config.vowels];

    const sequence = patternGrades.map(grade => {
        const octaveShift  = Math.floor(grade / 8);
        const scaleDegree  = grade % 8;
        const semitoneJump = scaleInt[scaleDegree] + (octaveShift * 12);
        return notes[baseNoteIdx + semitoneJump];
    });

    // Store for display
    currentSequence = sequence;
    currentStepIdx  = -1;
    renderDisplay(sequence, -1);

    const stepTime  = 60 / config.bpm;
    const isMessa   = config.pattern === 'messa';
    const duration  = isMessa ? 4 : stepTime * 0.8;
    const startTime = soundEngine.now + 0.05;

    sequence.forEach((note, i) => {
        const noteTime = startTime + i * stepTime;
        pianoInst.play(note, noteTime, { duration, gain: 0.9 });
        if (metEnabled) soundEngine.clickAt(noteTime);

        const uiDelay = Math.max(0, (noteTime - soundEngine.now) * 1000);
        const tid = setTimeout(() => {
            if (!isPlaying) return;
            currentStepIdx = i;
            document.getElementById('currentNote').innerText  = note;
            document.getElementById('currentVowel').innerText = vowelList[i % vowelList.length];
            document.getElementById('progressInfo').innerText = `Base: ${notes[baseNoteIdx]}`;
            updateChips();
            renderDisplay(sequence, i);
        }, uiDelay);
        scheduledTimers.push(tid);
    });

    const nextDelay = (sequence.length * stepTime + stepTime * 2) * 1000;
    const nextTid = setTimeout(() => {
        if (!isPlaying) return;
        if (config.mode === 'single') {
            stopExercise();
        } else if (config.mode === 'cycle') {
            if (baseNoteIdx >= config.end)   cycleDir = -1;
            if (baseNoteIdx <= config.start) cycleDir =  1;
            const nextIdx = baseNoteIdx + cycleDir;
            currentBaseIdx = nextIdx;
            runSequence(nextIdx, config);
        } else {
            const nextIdx = config.mode === 'loop' ? baseNoteIdx + 1 : baseNoteIdx - 1;
            currentBaseIdx = nextIdx;
            runSequence(nextIdx, config);
        }
    }, nextDelay);
    scheduledTimers.push(nextTid);
}

// Redraw on theme change
window.addEventListener('mt-theme-change', () => {
    renderDisplay(currentSequence.length ? currentSequence : ['C4','E4','G4','E4','C4'], currentStepIdx);
});

window.onload = init;
</script>
