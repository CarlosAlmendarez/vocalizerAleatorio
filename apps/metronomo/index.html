<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrónomo - MusicTools</title>
    <link rel="stylesheet" href="../../shared/design.css">
    <style>
        /* BPM display */
        .bpm-display { text-align:center; margin:6px 0 4px; }
        .bpm-number { font-family:var(--font-head); font-size:88px; font-weight:900; line-height:1; letter-spacing:-4px; color:var(--ink); transition:color 0.15s, text-shadow 0.15s; }
        .bpm-number.flash { color:var(--accent); text-shadow:var(--accent-glow); }
        .bpm-label { font-size:13px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
        .tempo-name { font-size:16px; font-weight:600; color:var(--ink-dim); margin-top:4px; min-height:22px; transition:opacity 0.2s; }

        /* Beat dots */
        .pendulum-wrap { display:flex; justify-content:center; margin:14px 0 6px; height:44px; align-items:center; }
        .beat-dots { display:flex; gap:10px; }
        .beat-dot { width:14px; height:14px; border-radius:50%; background:rgba(255,255,255,0.14); border:1px solid var(--border); transition:background 0.05s, transform 0.05s, box-shadow 0.05s; }
        .beat-dot.accent { background:rgba(157,107,255,0.25); border-color:rgba(157,107,255,0.4); width:18px; height:18px; }
        .beat-dot.active { background:var(--ink); transform:scale(1.3); box-shadow:0 0 14px rgba(238,240,255,0.7); }
        .beat-dot.accent.active { background:var(--accent); border-color:var(--accent); box-shadow:0 0 18px rgba(157,107,255,0.9); }

        /* BPM controls */
        .bpm-control-row { display:flex; align-items:center; gap:10px; }
        .bpm-btn { width:44px; height:44px; border-radius:50%; border:1px solid var(--border); background:var(--surface-s); font-size:22px; font-weight:700; cursor:pointer; font-family:var(--font-sans); display:flex; align-items:center; justify-content:center; transition:all 0.12s; flex-shrink:0; color:var(--ink-dim); line-height:1; }
        .bpm-btn:hover { border-color:rgba(157,107,255,0.4); color:var(--accent); background:rgba(157,107,255,0.1); }
        .bpm-btn:active { transform:scale(0.92); }
        .bpm-btn.large { width:52px; height:52px; font-size:26px; }

        .bpm-slider-wrap { flex:1; }
        input[type=range].bpm-slider { width:100%; height:6px; -webkit-appearance:none; appearance:none; background:linear-gradient(to right, var(--accent) var(--pct), var(--surface-ss) var(--pct)); border-radius:6px; outline:none; cursor:pointer; }
        input[type=range].bpm-slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--accent); box-shadow:0 2px 6px rgba(157,107,255,0.5); cursor:pointer; }
        input[type=range].bpm-slider::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:var(--accent); border:none; cursor:pointer; }

        /* Time signature */
        .time-sig-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
        .sig-btn { padding:10px 4px; border-radius:10px; border:1px solid var(--border); background:var(--surface-s); color:var(--ink-dim); font-size:14px; font-weight:700; cursor:pointer; font-family:var(--font-sans); text-align:center; transition:all 0.15s; }
        .sig-btn:hover  { border-color:rgba(157,107,255,0.4); color:var(--ink); }
        .sig-btn.active { background:rgba(157,107,255,0.22); border-color:var(--accent); color:var(--accent); }

        /* Tap tempo */
        .tap-btn {
            width:100%; padding:14px 16px;
            border-radius:14px; border:2px dashed rgba(var(--accent-rgb),0.35);
            background:rgba(var(--accent-rgb),0.06); color:var(--accent);
            cursor:pointer; font-family:var(--font-sans);
            transition:background 0.08s, transform 0.08s, box-shadow 0.15s;
            touch-action:manipulation; user-select:none; -webkit-user-select:none;
            display:flex; flex-direction:column; align-items:center; gap:4px;
        }
        .tap-btn:active { background:rgba(var(--accent-rgb),0.14); transform:scale(0.97); border-style:solid; }
        .tap-btn.tapping {
            background:rgba(var(--accent-rgb),0.2);
            box-shadow:0 0 20px rgba(var(--accent-rgb),0.3);
            border-style:solid;
        }
        .tap-text { font-size:16px; font-weight:700; letter-spacing:0.5px; line-height:1; }
        .tap-hint { font-size:11px; font-weight:600; letter-spacing:0.06em; color:rgba(var(--accent-rgb),0.65); min-height:15px; line-height:1; }

        /* Preset grid */
        .preset-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
        .preset-btn { padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:var(--surface-s); color:var(--ink-dim); cursor:pointer; font-family:var(--font-sans); text-align:left; transition:all 0.12s; display:flex; justify-content:space-between; align-items:center; }
        .preset-btn:hover  { border-color:rgba(157,107,255,0.4); background:var(--surface-ss); color:var(--ink); }
        .preset-btn.active { background:rgba(157,107,255,0.14); border-color:var(--accent); }
        .preset-name { font-size:13px; font-weight:700; color:var(--ink); }
        .preset-range { font-size:11px; color:var(--muted); }
    </style>
</head>
<body data-tool-name="Metrónomo" data-page-id="metronomo">
<div class="app-card">

    <!-- ── Display ── -->
    <div class="display-section">
        <div class="bpm-display">
            <div class="bpm-number" id="bpmNumber">120</div>
            <div class="bpm-label">BPM</div>
            <div class="tempo-name" id="tempoName">Allegro</div>
        </div>

        <div class="pendulum-wrap">
            <div class="beat-dots" id="beatDots"></div>
        </div>
    </div>

    <!-- ── Controles ── -->
    <div class="config-body">

        <!-- BPM slider -->
        <div class="section-card">
            <div class="section-title">Tempo</div>
            <div class="bpm-control-row" style="margin-bottom:14px;">
                <button class="bpm-btn large" onclick="changeBpm(-10)" title="-10">−−</button>
                <button class="bpm-btn" onclick="changeBpm(-1)" title="-1">−</button>
                <div class="bpm-slider-wrap">
                    <input type="range" class="bpm-slider" id="bpmSlider"
                           min="20" max="300" value="120"
                           oninput="setBpm(parseInt(this.value))">
                </div>
                <button class="bpm-btn" onclick="changeBpm(+1)" title="+1">+</button>
                <button class="bpm-btn large" onclick="changeBpm(+10)" title="+10">++</button>
            </div>

            <!-- Tap tempo -->
            <button class="tap-btn" id="tapBtn" onclick="tapTempo()">
                <span class="tap-text">Tap Tempo</span>
                <span class="tap-hint" id="tapHint"></span>
            </button>
        </div>

        <!-- Compás -->
        <div class="section-card">
            <div class="section-title">Compás</div>
            <div class="time-sig-grid" id="timeSigGrid">
                <button class="sig-btn" onclick="setTimeSig(2,4,this)">2/4</button>
                <button class="sig-btn active" onclick="setTimeSig(4,4,this)">4/4</button>
                <button class="sig-btn" onclick="setTimeSig(3,4,this)">3/4</button>
                <button class="sig-btn" onclick="setTimeSig(6,8,this)">6/8</button>
                <button class="sig-btn" onclick="setTimeSig(5,4,this)">5/4</button>
                <button class="sig-btn" onclick="setTimeSig(7,8,this)">7/8</button>
                <button class="sig-btn" onclick="setTimeSig(12,8,this)">12/8</button>
                <button class="sig-btn" onclick="setTimeSig(1,4,this)">1/4</button>
            </div>
        </div>

        <!-- Presets de tempo -->
        <div class="section-card">
            <div class="section-title">Indicaciones de tempo</div>
            <div class="preset-grid" id="presetGrid"></div>
        </div>

    </div>

    <div class="action-bar">
        <button class="btn btn-primary" id="mainBtn" onclick="toggleMetronome()" style="font-size:18px;font-weight:800;letter-spacing:0.5px;">
            ▶ Iniciar
        </button>
    </div>
</div>

<script>
// ══════════════════════════════════════════════
//  PRESETS DE TEMPO
// ══════════════════════════════════════════════
const TEMPO_PRESETS = [
    { name: 'Largo',       min: 20,  max: 52,  bpm: 40  },
    { name: 'Larghetto',   min: 52,  max: 63,  bpm: 58  },
    { name: 'Adagio',      min: 63,  max: 76,  bpm: 70  },
    { name: 'Andante',     min: 76,  max: 100, bpm: 88  },
    { name: 'Moderato',    min: 100, max: 116, bpm: 108 },
    { name: 'Allegretto',  min: 116, max: 126, bpm: 120 },
    { name: 'Allegro',     min: 126, max: 160, bpm: 140 },
    { name: 'Vivace',      min: 160, max: 176, bpm: 168 },
    { name: 'Presto',      min: 176, max: 210, bpm: 192 },
    { name: 'Prestissimo', min: 210, max: 300, bpm: 240 },
];

// ══════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════
let bpm           = 120;
let beatsPerBar   = 4;
let beatUnit      = 4;
let currentBeat   = 0;
let isPlaying     = false;

// Web Audio
let audioCtx      = null;
let masterGain    = null;
let schedulerId   = null;
let nextBeatTime  = 0;

// Tap tempo — interval-buffer algorithm
let tapIntervals   = [];   // stores last 4 intervals in ms
let lastTapTime    = 0;    // absolute timestamp of previous tap
const TAP_RESET_MS = 2500; // inactivity auto-reset timer

// Scheduler lookahead (Chris Wilson pattern)
const LOOKAHEAD_MS   = 25;    // Timer interval
const SCHEDULE_AHEAD = 0.12;  // Seconds to schedule ahead

// ══════════════════════════════════════════════
//  SÍNTESIS DE SONIDO CLÁSICO DE METRÓNOMO
//  (clic de madera con ataque nítido y decay corto)
// ══════════════════════════════════════════════
function scheduleClick(time, isAccent) {
    if (!audioCtx) return;

    // ── Componente 1: Cuerpo resonante (sinusoide con barrido de frecuencia)
    //    Simula la resonancia de la caja de madera del metrónomo
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();

    osc.type = 'sine';
    // El tono baja rápidamente: da el carácter "tok" vs un tono puro
    osc.frequency.setValueAtTime(isAccent ? 1850 : 1200, time);
    osc.frequency.exponentialRampToValueAtTime(isAccent ? 620 : 420, time + 0.045);

    oscGain.gain.setValueAtTime(0, time);
    oscGain.gain.linearRampToValueAtTime(isAccent ? 0.85 : 0.55, time + 0.001);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.07);

    osc.connect(oscGain);
    oscGain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.08);

    // ── Componente 2: Transiente de ataque (ruido filtrado ~5 ms)
    //    Da el "click" inicial nítido, como el golpe físico de la paleta
    const clickDur  = 0.005;
    const bufSize   = Math.ceil(audioCtx.sampleRate * clickDur);
    const noiseBuf  = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data      = noiseBuf.getChannelData(0);

    for (let i = 0; i < bufSize; i++) {
        // Ruido con envolvente de caída lineal (más nítido al inicio)
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    }

    const noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = noiseBuf;

    // Filtro pasa-banda para dar el timbre de madera
    const bpFilter = audioCtx.createBiquadFilter();
    bpFilter.type      = 'bandpass';
    bpFilter.frequency.value = isAccent ? 3200 : 2200;
    bpFilter.Q.value   = 1.8;

    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(isAccent ? 0.55 : 0.38, time);

    noiseNode.connect(bpFilter);
    bpFilter.connect(noiseGain);
    noiseGain.connect(masterGain);

    noiseNode.start(time);
    noiseNode.stop(time + clickDur + 0.002);

    // ── Animar el beat dot correspondiente
    const beatIdx = currentBeat % beatsPerBar;
    const delayMs = Math.max(0, (time - audioCtx.currentTime) * 1000);
    setTimeout(() => flashBeat(beatIdx), delayMs);
}

// ══════════════════════════════════════════════
//  SCHEDULER (lookahead para timing preciso)
// ══════════════════════════════════════════════
function scheduler() {
    const secondsPerBeat = (beatUnit / 4) * (60.0 / bpm);

    while (nextBeatTime < audioCtx.currentTime + SCHEDULE_AHEAD) {
        const isAccent = (currentBeat % beatsPerBar === 0);
        scheduleClick(nextBeatTime, isAccent);
        currentBeat++;
        nextBeatTime += secondsPerBeat;
    }
}

// ══════════════════════════════════════════════
//  CONTROL DE REPRODUCCIÓN
// ══════════════════════════════════════════════
async function toggleMetronome() {
    if (isPlaying) {
        stopMetronome();
    } else {
        await startMetronome();
    }
}

async function startMetronome() {
    // Crear contexto de audio la primera vez
    if (!audioCtx) {
        audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 1.0;
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    isPlaying    = true;
    currentBeat  = 0;
    nextBeatTime = audioCtx.currentTime + 0.05;

    schedulerId  = setInterval(scheduler, LOOKAHEAD_MS);

    document.getElementById('mainBtn').innerHTML =
        '<i class="ti ti-player-stop-filled"></i> Detener';
    document.getElementById('mainBtn').className = 'btn btn-primary'; document.getElementById('mainBtn').style.background='linear-gradient(135deg,#ff5b7f,#ff416c)';
}

function stopMetronome() {
    isPlaying = false;
    clearInterval(schedulerId);
    schedulerId = null;

    // Apagar todos los beat dots
    document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));

    document.getElementById('mainBtn').innerHTML =
        '<i class="ti ti-player-play-filled"></i> Iniciar';
    document.getElementById('mainBtn').className = 'btn btn-primary'; document.getElementById('mainBtn').style.background='';
}

// ══════════════════════════════════════════════
//  CONTROLES DE BPM
// ══════════════════════════════════════════════
function setBpm(val) {
    bpm = Math.max(20, Math.min(300, val));

    document.getElementById('bpmNumber').textContent = bpm;
    document.getElementById('bpmSlider').value       = bpm;

    // Actualizar fondo del slider
    const pct = ((bpm - 20) / (300 - 20)) * 100;
    document.getElementById('bpmSlider').style.setProperty('--pct', pct + '%');

    // Nombre del tempo
    const preset = TEMPO_PRESETS.find(p => bpm >= p.min && bpm < p.max)
                || TEMPO_PRESETS[TEMPO_PRESETS.length - 1];
    document.getElementById('tempoName').textContent = preset.name;

    // Flash del número
    const el = document.getElementById('bpmNumber');
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 120);

    // Actualizar preset activo
    document.querySelectorAll('.preset-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.name === preset.name);
    });
}

function changeBpm(delta) {
    setBpm(bpm + delta);
}

// ══════════════════════════════════════════════
//  TAP TEMPO
// ══════════════════════════════════════════════
function tapTempo() {
    const now  = Date.now();
    const hint = document.getElementById('tapHint');
    const btn  = document.getElementById('tapBtn');

    // Reset buffer if gap > 2 s (< 30 BPM = new session)
    if (lastTapTime > 0 && now - lastTapTime > 2000) {
        tapIntervals = [];
    }

    // Store interval from previous tap (skip on first tap)
    if (lastTapTime > 0) {
        tapIntervals.push(now - lastTapTime);
        if (tapIntervals.length > 4) tapIntervals.shift(); // keep last 4
    }

    lastTapTime = now;

    // Calculate BPM from average of stored intervals
    if (tapIntervals.length > 0) {
        const avg = tapIntervals.reduce((a, b) => a + b, 0) / tapIntervals.length;
        setBpm(Math.round(60000 / avg));
    }

    // Progress feedback
    const n = tapIntervals.length;
    if (n === 0) {
        hint.textContent = 'Sigue presionando...';
    } else if (n < 4) {
        hint.textContent = `${n + 1} / 4 taps`;
    } else {
        hint.textContent = `✓ ${bpm} BPM calibrado`;
    }

    // Flash
    btn.classList.add('tapping');
    setTimeout(() => btn.classList.remove('tapping'), 130);

    // Auto-reset after 2.5 s of inactivity
    clearTimeout(tapTempo._reset);
    tapTempo._reset = setTimeout(() => {
        tapIntervals = [];
        lastTapTime  = 0;
        hint.textContent = '';
    }, TAP_RESET_MS);
}

// ══════════════════════════════════════════════
//  COMPÁS
// ══════════════════════════════════════════════
function setTimeSig(beats, unit, btn) {
    beatsPerBar = beats;
    beatUnit    = unit;
    currentBeat = 0;

    document.querySelectorAll('.sig-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    renderBeatDots();
}

// ══════════════════════════════════════════════
//  FLASH DE BEAT
// ══════════════════════════════════════════════
function flashBeat(beatIdx) {
    const dots = document.querySelectorAll('.beat-dot');
    dots.forEach(d => d.classList.remove('active'));
    if (dots[beatIdx]) {
        dots[beatIdx].classList.add('active');
    }
}

// ══════════════════════════════════════════════
//  RENDER UI
// ══════════════════════════════════════════════
function renderBeatDots() {
    const container = document.getElementById('beatDots');
    container.innerHTML = '';
    for (let i = 0; i < beatsPerBar; i++) {
        const dot = document.createElement('div');
        dot.className = 'beat-dot' + (i === 0 ? ' accent' : '');
        container.appendChild(dot);
    }
}

function renderPresets() {
    const grid = document.getElementById('presetGrid');
    const currentPreset = TEMPO_PRESETS.find(p => bpm >= p.min && bpm < p.max)
                       || TEMPO_PRESETS[TEMPO_PRESETS.length - 1];

    grid.innerHTML = TEMPO_PRESETS.map(p =>
        `<button class="preset-btn${p.name === currentPreset.name ? ' active' : ''}"
                 data-name="${p.name}"
                 onclick="setBpm(${p.bpm}); renderPresets();">
            <span class="preset-name">${p.name}</span>
            <span class="preset-range">${p.min}–${p.max}</span>
        </button>`
    ).join('');
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
setBpm(120);
renderBeatDots();
renderPresets();
</script>
<script src="../../shared/shell.js"></script>
</body>
</html>
