<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acordes Piano - MusicTools</title>
    <script src="https://cdn.jsdelivr.net/npm/soundfont-player/dist/soundfont-player.js"></script>
    <script src="../../shared/sound-engine.js"></script>
    <link rel="stylesheet" href="../../shared/design.css">
    <style>
        .piano-screen {
            display: flex; flex-direction: column; gap: 14px;
            padding: 10px 0 calc(var(--bottomnav-h) + 36px);
            color: var(--ink);
        }
        @media (min-width: 960px) { .piano-screen { padding-bottom: 48px; } }

        /* ── Hero ── */
        .piano-hero {
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 10px; flex-wrap: wrap;
        }
        .piano-title {
            font-family: var(--font-head);
            font-size: clamp(28px, 7vw, 44px);
            font-weight: 800; line-height: 1; letter-spacing: -.04em; color: var(--ink);
        }
        .piano-title .acc { color: var(--accent); text-shadow: var(--accent-glow); }
        .piano-sub { font-size: 12px; color: var(--ink-dim); margin-top: 4px; }

        /* ── Hand toggle ── */
        .hand-toggle {
            display: flex; border: 1px solid var(--border);
            border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0;
        }
        .hand-btn {
            padding: 8px 13px; border: none; background: var(--surface);
            color: var(--ink-dim); font-size: 12px; font-weight: 700;
            font-family: var(--font-sans); cursor: pointer; transition: all .13s;
            touch-action: manipulation; user-select: none;
        }
        .hand-btn.on { background: rgba(var(--accent-rgb),.16); color: var(--accent); }
        .hand-btn:not(.on):hover { background: var(--surface-s); color: var(--ink); }

        /* ── Chord name display ── */
        .piano-chord-header {
            display: flex; align-items: baseline; justify-content: center;
            gap: 6px; padding: 4px 0;
        }
        .piano-chord-big {
            font-family: var(--font-head); font-size: clamp(48px,12vw,72px);
            font-weight: 900; line-height: 1; color: var(--accent);
            text-shadow: var(--accent-glow); letter-spacing: -.04em;
        }
        .piano-chord-type {
            font-size: 20px; font-weight: 600; color: var(--ink-dim);
            align-self: flex-start; margin-top: 12px;
        }
        .piano-notes-row {
            text-align: center; font-size: 13px; color: var(--muted);
            letter-spacing: .06em; margin-top: -4px;
        }

        /* ── Root grid ── */
        .piano-root-scroll { overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
        .piano-root-scroll::-webkit-scrollbar { display: none; }
        .piano-root-grid { display: flex; gap: 5px; width: max-content; }
        .piano-root-btn {
            min-width: 42px; padding: 9px 6px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--surface-s);
            color: var(--ink); font-family: var(--font-head); font-size: 14px; font-weight: 800;
            cursor: pointer; transition: all .13s; text-align: center; touch-action: manipulation;
            line-height: 1.2;
        }
        .piano-root-btn:hover { border-color: rgba(var(--accent-rgb),.3); color: var(--accent); }
        .piano-root-btn.active {
            background: rgba(var(--accent-rgb),.18); border-color: var(--accent); color: var(--accent);
        }

        /* ── Chord type chips ── */
        .piano-type-scroll { overflow-x: auto; scrollbar-width: none; }
        .piano-type-scroll::-webkit-scrollbar { display: none; }
        .piano-type-row { display: flex; gap: 6px; width: max-content; }
        .piano-type-btn {
            padding: 7px 14px; border-radius: 999px;
            border: 1px solid var(--border); background: var(--surface-s);
            color: var(--ink-dim); font-family: var(--font-head); font-size: 13px; font-weight: 700;
            cursor: pointer; transition: all .13s; white-space: nowrap; touch-action: manipulation;
        }
        .piano-type-btn:hover { border-color: rgba(var(--accent-rgb),.3); color: var(--ink); }
        .piano-type-btn.active {
            background: rgba(var(--accent-rgb),.18); border-color: var(--accent); color: var(--accent);
        }

        /* ── Canvas keyboard ── */
        .piano-canvas-wrap {
            background: var(--surface-s); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            padding: 14px 10px 16px;
        }
        #pianoCanvas { display: block; width: 100%; }

        /* ── Inversion buttons ── */
        .piano-inv-row {
            display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
        }
        .piano-inv-btn {
            padding: 8px 16px; border-radius: 999px;
            border: 1px solid var(--border); background: var(--surface-s);
            color: var(--ink-dim); font-size: 12px; font-weight: 700;
            font-family: var(--font-sans); cursor: pointer; transition: all .13s;
            touch-action: manipulation; user-select: none;
        }
        .piano-inv-btn:hover { border-color: rgba(var(--accent-rgb),.3); color: var(--ink); }
        .piano-inv-btn.active {
            background: rgba(var(--accent-rgb),.18); border-color: var(--accent); color: var(--accent);
        }

        /* ── Play button ── */
        .piano-play-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px;
            border-radius: var(--radius); border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: var(--accent-ink); font-family: var(--font-head); font-size: 16px; font-weight: 800;
            cursor: pointer; box-shadow: var(--accent-shadow); transition: all .15s;
            touch-action: manipulation; letter-spacing: -.01em;
        }
        .piano-play-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 36px -8px rgba(var(--accent-rgb),.55); }
        .piano-play-btn:active { transform: scale(.97); }
        .piano-play-btn.playing { background: linear-gradient(135deg,#ff3366,#ff5b7f); box-shadow: 0 8px 24px -6px rgba(255,51,102,.6); }

        /* ── Theory card ── */
        .piano-theory-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 14px 16px;
            border-left: 3px solid var(--accent);
        }
        .theory-title {
            font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
            color: var(--accent); margin-bottom: 8px;
        }
        .theory-formula {
            font-family: ui-monospace, monospace; font-size: 14px; font-weight: 700;
            color: var(--ink); margin-bottom: 6px; letter-spacing: .02em;
        }
        .theory-intervals {
            display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
        }
        .theory-interval-chip {
            padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700;
            font-family: ui-monospace, monospace;
            background: rgba(var(--accent-rgb),.1); color: var(--accent);
            border: 1px solid rgba(var(--accent-rgb),.22);
        }
        .theory-desc {
            font-size: 12px; color: var(--ink-dim); line-height: 1.65;
        }

        /* ── Finger legend ── */
        .finger-legend {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            padding: 8px 12px; border-radius: var(--radius-sm);
            background: rgba(var(--accent-rgb),.06); border: 1px solid rgba(var(--accent-rgb),.12);
        }
        .finger-legend-title {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .06em; color: var(--muted); flex-shrink: 0;
        }
        .finger-legend-pills { display: flex; gap: 5px; flex-wrap: wrap; }
        .finger-pill {
            display: flex; align-items: center; gap: 4px;
            padding: 2px 7px; border-radius: 999px; font-size: 10px; font-weight: 700;
            background: var(--surface-s); border: 1px solid var(--border); color: var(--muted);
        }
        .finger-pill-num {
            width: 14px; height: 14px; border-radius: 50%; background: var(--accent);
            color: var(--accent-ink); font-size: 9px; font-weight: 900;
            display: grid; place-items: center; flex-shrink: 0;
        }
    </style>
</head>
<body data-tool-name="Acordes Piano" data-page-id="acordes-piano">

<div class="piano-screen">

        Escuchar Acorde

</div>

<script src="../../shared/audio-utils.js"></script>
<script>
// ── Data ──────────────────────────────────────────────────────────
const ROOT_LABELS = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const SHARP_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT_NAMES  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const PREFER_FLAT = new Set([3,8,10]); // Eb, Ab, Bb

const CHORD_TYPES = [
    { id:'maj',  label:'Mayor',  suffix:'',     fullName:'Mayor'         },
    { id:'min',  label:'Menor',  suffix:'m',    fullName:'Menor'         },
    { id:'dom7', label:'7',      suffix:'7',    fullName:'Séptima Dom.'  },
    { id:'maj7', label:'maj7',   suffix:'maj7', fullName:'Mayor 7'       },
    { id:'min7', label:'m7',     suffix:'m7',   fullName:'Menor 7'       },
    { id:'sus4', label:'sus4',   suffix:'sus4', fullName:'Sus4'          },
    { id:'dim',  label:'dim',    suffix:'°',    fullName:'Disminuido'    },
    { id:'aug',  label:'aug',    suffix:'+',    fullName:'Aumentado'     },
];

const CHORD_INTERVALS = {
    maj:  [0,4,7],
    min:  [0,3,7],
    dom7: [0,4,7,10],
    maj7: [0,4,7,11],
    min7: [0,3,7,10],
    sus4: [0,5,7],
    dim:  [0,3,6],
    aug:  [0,4,8],
};

const THEORY = {
    maj:  { formula: 'Raíz  +  3ª Mayor  +  5ª Justa', intervals: ['1','3M','5J'],
            desc: 'La triada mayor. Sonido alegre, estable y brillante. Punto de partida para todo músico.' },
    min:  { formula: 'Raíz  +  3ª Menor  +  5ª Justa', intervals: ['1','3m','5J'],
            desc: 'La triada menor. Un semitono abajo en la tercera cambia el sonido a melancólico y expresivo.' },
    dom7: { formula: 'Raíz  +  3ª Mayor  +  5ª Justa  +  7ª Menor', intervals: ['1','3M','5J','7m'],
            desc: 'Añade una 7ª menor al acorde mayor. Crea tensión que pide resolver. Fundamental en blues, jazz y gospel.' },
    maj7: { formula: 'Raíz  +  3ª Mayor  +  5ª Justa  +  7ª Mayor', intervals: ['1','3M','5J','7M'],
            desc: 'Suave y sofisticado. La 7ª mayor añade color sin tensión. Muy usado en jazz, bossa nova y R&B.' },
    min7: { formula: 'Raíz  +  3ª Menor  +  5ª Justa  +  7ª Menor', intervals: ['1','3m','5J','7m'],
            desc: 'Oscuro pero fluido. Dos terceras menores y la 7ª menor crean ese sabor característico del soul y funk.' },
    sus4: { formula: 'Raíz  +  4ª Justa  +  5ª Justa', intervals: ['1','4J','5J'],
            desc: 'Sin tercera: la 4ª reemplaza a la 3ª. Crea suspenso que resuelve natural al acorde mayor.' },
    dim:  { formula: 'Raíz  +  3ª Menor  +  5ª Disminuida', intervals: ['1','3m','5d'],
            desc: 'Dos terceras menores apiladas. Muy tenso y disonante. Excelente como acorde de paso dramático.' },
    aug:  { formula: 'Raíz  +  3ª Mayor  +  5ª Aumentada', intervals: ['1','3M','5+'],
            desc: 'Dos terceras mayores apiladas. Misterioso y expansivo. Habitual en música cinematográfica y impresionismo.' },
};

// Fingering: indexed by [hand][noteCount][inversion] → array of fingers (index = sorted position)
const FINGERING = {
    right: {
        3: { 0:[1,3,5], 1:[1,2,5], 2:[1,3,5] },
        4: { 0:[1,2,3,5], 1:[1,2,4,5], 2:[1,2,3,5], 3:[1,2,4,5] },
    },
    left: {
        3: { 0:[5,3,1], 1:[5,3,1], 2:[5,2,1] },
        4: { 0:[5,4,3,1], 1:[5,4,2,1], 2:[5,3,2,1], 3:[5,4,3,1] },
    },
};

const FINGER_NAMES = { 1:'Pulgar', 2:'Índice', 3:'Corazón', 4:'Anular', 5:'Meñique' };

// ── State ─────────────────────────────────────────────────────────
let rootIdx   = 0;
let chordType = 'maj';
let inversion = 0;
let leftHand  = false;
let pianoInst = null;
let isPlaying = false;

// ── Chord maths ───────────────────────────────────────────────────
const BASE_MIDI = 60; // C4

function baseNotes() {
    return CHORD_INTERVALS[chordType].map(s => BASE_MIDI + rootIdx + s);
}

function applyInv(notes, inv) {
    let ns = [...notes];
    for (let v = 0; v < inv; v++) {
        ns[0] += 12;
        ns.sort((a, b) => a - b);
    }
    return ns;
}

function currentMidis() {
    return applyInv(baseNotes(), inversion);
}

function midiName(midi) {
    const semi = ((midi % 12) + 12) % 12;
    return PREFER_FLAT.has(rootIdx) ? FLAT_NAMES[semi] : SHARP_NAMES[semi];
}

function getFingers() {
    const n = CHORD_INTERVALS[chordType].length;
    const hand = leftHand ? 'left' : 'right';
    const table = FINGERING[hand][n] || FINGERING[hand][3];
    const invKey = Math.min(inversion, Object.keys(table).length - 1);
    return table[invKey] || table[0];
}

// ── Canvas drawing ────────────────────────────────────────────────
const WHITE_IN_OCT  = [0, 2, 4, 5, 7, 9, 11];        // semitones = white keys
const BLACK_XPOS    = {1:.67, 3:1.67, 6:3.67, 8:4.67, 10:5.67}; // x offset in white units
const DISPLAY_OCTS  = 2;
const N_WHITES      = 7 * DISPLAY_OCTS; // 14

function keyInfo(midi) {
    const off  = midi - BASE_MIDI;
    if (off < 0 || off >= 12 * DISPLAY_OCTS) return null;
    const oct  = Math.floor(off / 12);
    const semi = off % 12;
    if (WHITE_IN_OCT.includes(semi)) {
        return { isWhite: true, pos: oct * 7 + WHITE_IN_OCT.indexOf(semi) };
    }
    if (BLACK_XPOS[semi] !== undefined) {
        return { isWhite: false, pos: oct * 7 + BLACK_XPOS[semi] };
    }
    return null;
}

function drawKeyboard() {
    const canvas = document.getElementById('pianoCanvas');
    if (!canvas) return;

    const dpr  = window.devicePixelRatio || 1;
    const cssW = canvas.offsetWidth || 300;
    const cssH = Math.round(Math.min(150, Math.max(108, cssW * 0.34)));
    canvas.width  = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    canvas.style.height = cssH + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const W  = cssW, H = cssH;
    const wW = W / N_WHITES;
    const wH = H - 2;
    const bW = wW * 0.60;
    const bH = wH * 0.60;
    const R  = 3;

    const CS = getComputedStyle(document.documentElement);
    const accent    = CS.getPropertyValue('--accent').trim()     || '#9d6bff';
    const accent2   = CS.getPropertyValue('--accent2').trim()    || '#e85a3c';
    const accentRgb = CS.getPropertyValue('--accent-rgb').trim() || '157,107,255';
    const border    = CS.getPropertyValue('--border').trim()     || '#333';
    const theme     = document.documentElement.getAttribute('data-theme') || 'neon';
    const isDark    = theme !== 'minimal';

    const wKeyCol = isDark ? '#ddddd8' : '#f4f3ee';
    const bKeyCol = isDark ? '#18182a' : '#111118';
    const wBorder = isDark ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.18)';

    const midis    = currentMidis();
    const rootMidi = BASE_MIDI + rootIdx;
    const sorted   = [...midis].sort((a, b) => a - b);
    const fingers  = getFingers();

    ctx.clearRect(0, 0, W, H);

    // ── White keys ──
    for (let i = 0; i < N_WHITES; i++) {
        const oct  = Math.floor(i / 7);
        const semi = WHITE_IN_OCT[i % 7];
        const midi = BASE_MIDI + oct * 12 + semi;
        const ki   = keyInfo(midi);
        if (!ki) continue;

        const isHigh  = midis.includes(midi);
        const isRoot  = isHigh && (midi - rootMidi) % 12 === 0;
        const x = i * wW + 0.5;
        const w = wW - 1;

        if (isRoot) {
            ctx.fillStyle = accent;
        } else if (isHigh) {
            ctx.fillStyle = `rgba(${accentRgb}, 0.38)`;
        } else {
            ctx.fillStyle = wKeyCol;
        }

        // Rounded bottom rectangle
        ctx.beginPath();
        ctx.moveTo(x, 1);
        ctx.lineTo(x + w, 1);
        ctx.lineTo(x + w, wH - R);
        ctx.arcTo(x + w, wH, x + w - R, wH, R);
        ctx.lineTo(x + R, wH);
        ctx.arcTo(x, wH, x, wH - R, R);
        ctx.lineTo(x, 1);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = wBorder;
        ctx.lineWidth = 1;
        ctx.stroke();

        if (isHigh) {
            const cx = x + w / 2;
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur  = 3;

            // Finger number near top
            const posInChord = sorted.indexOf(midi);
            if (posInChord >= 0 && fingers[posInChord]) {
                ctx.fillStyle = '#fff';
                ctx.font = `900 ${Math.max(9, Math.min(14, wW * 0.46))}px sans-serif`;
                ctx.textAlign    = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(String(fingers[posInChord]), cx, 6);
            }

            // Note name near bottom
            ctx.fillStyle = '#fff';
            ctx.font = `700 ${Math.max(7, Math.min(11, wW * 0.38))}px sans-serif`;
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(midiName(midi), cx, wH - 3);

            ctx.shadowBlur = 0;
        }
    }

    // ── Black keys ──
    for (let oct = 0; oct < DISPLAY_OCTS; oct++) {
        for (const [semiStr, bxPos] of Object.entries(BLACK_XPOS)) {
            const semi = parseInt(semiStr);
            const midi = BASE_MIDI + oct * 12 + semi;
            const isHigh  = midis.includes(midi);
            const isRoot  = isHigh && (midi - rootMidi) % 12 === 0;

            const bx = (oct * 7 + bxPos) * wW - bW / 2;

            if (isRoot) {
                ctx.fillStyle = accent;
            } else if (isHigh) {
                ctx.fillStyle = accent2;
            } else {
                ctx.fillStyle = bKeyCol;
            }

            // Rounded bottom rectangle
            ctx.beginPath();
            ctx.moveTo(bx, 1);
            ctx.lineTo(bx + bW, 1);
            ctx.lineTo(bx + bW, bH - R);
            ctx.arcTo(bx + bW, bH, bx + bW - R, bH, R);
            ctx.lineTo(bx + R, bH);
            ctx.arcTo(bx, bH, bx, bH - R, R);
            ctx.lineTo(bx, 1);
            ctx.closePath();
            ctx.fill();

            if (isHigh) {
                const cx = bx + bW / 2;
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur  = 2;

                // Finger number
                const posInChord = sorted.indexOf(midi);
                if (posInChord >= 0 && fingers[posInChord]) {
                    ctx.fillStyle = '#fff';
                    ctx.font = `900 ${Math.max(8, Math.min(11, bW * 0.48))}px sans-serif`;
                    ctx.textAlign    = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillText(String(fingers[posInChord]), cx, 4);
                }

                // Note name
                ctx.fillStyle = '#fff';
                ctx.font = `700 ${Math.max(6, Math.min(9, bW * 0.38))}px sans-serif`;
                ctx.textBaseline = 'bottom';
                ctx.fillText(midiName(midi), cx, bH - 3);

                ctx.shadowBlur = 0;
            }
        }
    }
}

// ── Audio ─────────────────────────────────────────────────────────
async function playChord() {
    const btn = document.getElementById('playBtn');
    if (isPlaying) return;
    isPlaying = true;
    btn.classList.add('playing');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg> Sonando…';

    if (!pianoInst) pianoInst = await soundEngine.get('acoustic_grand_piano');

    if (pianoInst) {
        const midis = currentMidis();
        const noteNames = midis.map(m => {
            const semi = ((m % 12) + 12) % 12;
            const oct  = Math.floor(m / 12) - 1;
            return SHARP_NAMES[semi] + oct;
        });
        noteNames.forEach((n, i) => {
            setTimeout(() => pianoInst.play(n, soundEngine.now, { duration: 2.2, gain: 0.72 }), i * 65);
        });
    }

    setTimeout(() => {
        isPlaying = false;
        btn.classList.remove('playing');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="m8 5 12 7-12 7z"/></svg> Escuchar Acorde';
    }, 2400);
}

// ── UI updates ────────────────────────────────────────────────────
function update() {
    drawKeyboard();

    const midis   = currentMidis();
    const typeObj = CHORD_TYPES.find(t => t.id === chordType);
    const root    = ROOT_LABELS[rootIdx];

    document.getElementById('chordBig').textContent    = root;
    document.getElementById('chordTypeLbl').textContent = typeObj?.suffix || '';
    document.getElementById('notesRow').textContent    = midis.map(midiName).join(' · ');

    // Theory
    const th = THEORY[chordType];
    document.getElementById('theoryFormula').textContent = th.formula;
    document.getElementById('theoryIntervals').innerHTML = th.intervals
        .map(s => `<span class="theory-interval-chip">${s}</span>`).join('');
    document.getElementById('theoryDesc').textContent = th.desc;

    // Inversion button states
    document.querySelectorAll('.piano-inv-btn').forEach(b =>
        b.classList.toggle('active', +b.dataset.inv === inversion)
    );

    // Finger legend
    updateFingerLegend(midis);
}

function updateFingerLegend(midis) {
    const sorted  = [...midis].sort((a, b) => a - b);
    const fingers = getFingers();
    const hand    = leftHand ? 'Izquierda' : 'Derecha';
    document.getElementById('fingerLegend').querySelector('.finger-legend-title').textContent =
        `Mano ${hand}`;
    document.getElementById('fingerPills').innerHTML = sorted.map((m, i) => {
        const f   = fingers[i] || (i + 1);
        const nm  = midiName(m);
        const oct = Math.floor(m / 12) - 1;
        return `<span class="finger-pill"><span class="finger-pill-num">${f}</span>${nm}${oct} · ${FINGER_NAMES[f] || f}</span>`;
    }).join('');
}

// ── Selection handlers ────────────────────────────────────────────
function selectRoot(i) {
    rootIdx   = i;
    inversion = 0;
    document.querySelectorAll('.piano-root-btn').forEach(b =>
        b.classList.toggle('active', +b.dataset.i === i)
    );
    renderInvButtons();
    update();
}

function selectType(type) {
    chordType = type;
    inversion = 0;
    document.querySelectorAll('.piano-type-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.type === type)
    );
    renderInvButtons();
    update();
}

function selectInversion(inv) {
    inversion = inv;
    document.querySelectorAll('.piano-inv-btn').forEach(b =>
        b.classList.toggle('active', +b.dataset.inv === inv)
    );
    update();
}

function setHand(hand, btn) {
    leftHand = hand === 'left';
    document.querySelectorAll('.hand-btn').forEach(b =>
        b.classList.toggle('on', b.dataset.hand === hand)
    );
    update();
}

// ── Render helpers ────────────────────────────────────────────────
function renderRootGrid() {
    document.getElementById('rootGrid').innerHTML = ROOT_LABELS.map((lbl, i) =>
        `<button class="piano-root-btn${i === rootIdx ? ' active' : ''}" data-i="${i}" onclick="selectRoot(${i})">${lbl}</button>`
    ).join('');
}

function renderTypeRow() {
    document.getElementById('typeRow').innerHTML = CHORD_TYPES.map(t =>
        `<button class="piano-type-btn${t.id === chordType ? ' active' : ''}" data-type="${t.id}" onclick="selectType('${t.id}')">${t.label}</button>`
    ).join('');
}

function renderInvButtons() {
    const n      = CHORD_INTERVALS[chordType].length;
    const labels = ['Fundamental','1ª Inv','2ª Inv','3ª Inv'];
    let html = '';
    for (let v = 0; v < n; v++) {
        html += `<button class="piano-inv-btn${v === inversion ? ' active' : ''}" data-inv="${v}" onclick="selectInversion(${v})">${labels[v]}</button>`;
    }
    document.getElementById('invRow').innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────────
function init() {
    renderRootGrid();
    renderTypeRow();
    renderInvButtons();
    update();

    window.addEventListener('resize', drawKeyboard);
    window.addEventListener('mt-theme-change', drawKeyboard);
}
</script>
<script src="../../shared/shell.js"></script>
<script>
window.addEventListener('load', init);
</script>
</body>
</html>
