<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acordes Guitarra - MusicTools</title>
    <script src="https://cdn.jsdelivr.net/npm/soundfont-player/dist/soundfont-player.js"></script>
    <script src="../../shared/sound-engine.js"></script>
    <link rel="stylesheet" href="../../shared/design.css">
    <style>
        /* Cabecera */
        .chord-header {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 6px;
            margin: 8px 0 2px;
        }
        .chord-name-big  { font-family: var(--font-head); font-size: 58px; font-weight: 800; line-height: 1; color: var(--accent); text-shadow: var(--accent-glow); }
        .chord-type-sup  { font-size: 20px; font-weight: 600; color: var(--ink-dim); align-self: flex-start; margin-top: 10px; }
        .chord-notes-row { font-size: 13px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.3px; }

        /* Diagrama */
        .diagram-wrap {
            display: flex;
            justify-content: center;
            padding: 8px 0 4px;
        }
        canvas#chordCanvas { display: block; }

        /* Strum animation */
        @keyframes strumPulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        .btn-strum.strumming { animation: strumPulse 0.25s ease; }

        /* Root grid */
        .root-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }
        .root-btn {
            padding: 8px 2px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-s);
            color: var(--ink-dim);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-sans);
            text-align: center;
            transition: all 0.15s;
        }
        .root-btn:hover  { border-color: rgba(var(--accent-rgb),0.4); color: var(--accent); }
        .root-btn.active { background: rgba(var(--accent-rgb),0.22); border-color: var(--accent); color: var(--accent); }

        /* Type chips */
        .type-chip {
            padding: 7px 13px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface-s);
            color: var(--ink-dim);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all 0.15s;
            white-space: nowrap;
        }
        .type-chip:hover  { border-color: rgba(var(--accent-rgb),0.4); color: var(--ink); }
        .type-chip.active { background: rgba(var(--accent-rgb),0.22); border-color: var(--accent); color: var(--accent); }

        /* Note pills */
        .note-pills { display: flex; gap: 6px; flex-wrap: wrap; }
        .note-pill {
            padding: 5px 11px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            background: rgba(var(--accent-rgb),0.1);
            color: var(--ink-dim);
            border: 1px solid var(--border);
        }
        .note-pill.root { background: rgba(var(--accent-rgb),0.24); color: var(--accent); border-color: rgba(var(--accent-rgb),0.4); }
        /* ── New chord screen layout ── */
        .chord-screen {
            display: flex; flex-direction: column; gap: 22px;
            padding: 12px 0 32px; color: var(--ink);
        }

        /* Hero header */
        .chord-hero { text-align: center; }
        .chord-hero-label {
            font-size: 10px; font-weight: 700; color: var(--muted);
            letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 4px;
        }
        .chord-hero-name {
            font-family: var(--font-head);
            font-size: clamp(64px, 18vw, 88px);
            font-weight: 800; line-height: 1; letter-spacing: -0.04em;
            color: var(--ink);
        }
        .chord-hero-name .type-mark {
            color: var(--accent);
            font-size: 0.55em;
            vertical-align: super;
            margin-left: 2px;
        }
        .chord-hero-sub {
            font-size: 13px; color: var(--ink-dim); margin-top: 6px;
        }

        /* Diagram */
        .chord-diagram-wrap {
            display: flex; justify-content: center;
            padding: 4px 0;
        }
        #chordCanvas {
            border-radius: var(--radius-sm);
        }

        /* Note pills */
        .chord-note-pills {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .chord-note-pill {
            padding: 8px 16px; border-radius: 999px;
            font-family: var(--font-head);
            font-size: 14px; font-weight: 800;
            background: rgba(var(--accent-rgb), 0.12);
            color: var(--accent);
            border: 1px solid rgba(var(--accent-rgb), 0.3);
            transition: all 0.15s;
        }
        .chord-note-pill.root {
            background: var(--accent);
            color: var(--accent-ink);
            border-color: transparent;
            box-shadow: var(--accent-shadow);
        }

        /* Action buttons */
        .chord-actions {
            display: flex; gap: 10px; justify-content: center;
        }
        .chord-strum-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 28px; border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: var(--accent-ink);
            font-weight: 800; font-size: 15px; font-family: var(--font-sans);
            border: none; cursor: pointer; min-height: 52px;
            box-shadow: var(--accent-shadow);
            transition: transform 0.12s, box-shadow 0.2s;
        }
        .chord-strum-btn:hover  { transform: scale(1.03); box-shadow: var(--accent-glow), var(--accent-shadow); }
        .chord-strum-btn:active { transform: scale(0.96); }
        .chord-strum-btn.strumming { animation: strumPulse 0.25s ease; }
        @keyframes strumPulse { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }

        .chord-arp-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 22px; border-radius: 999px;
            background: var(--surface-s); border: 1px solid var(--border);
            color: var(--ink); font-weight: 700; font-size: 14px; font-family: var(--font-sans);
            cursor: pointer; min-height: 52px;
            transition: all 0.15s;
        }
        .chord-arp-btn:hover {
            background: var(--surface-ss);
            border-color: rgba(var(--accent-rgb), 0.3);
            color: var(--accent);
        }
        .chord-arp-btn.playing { color: var(--accent); border-color: rgba(var(--accent-rgb), 0.4); }

        /* Section label */
        .chord-section-label {
            font-size: 10px; font-weight: 700; color: var(--muted);
            letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px;
        }

        /* Root grid */
        .chord-root-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }
        .chord-root-btn {
            padding: 14px 4px; border-radius: var(--radius-sm);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--ink);
            font-family: var(--font-head);
            font-weight: 800; font-size: 14px;
            cursor: pointer; min-height: 52px;
            transition: all 0.15s;
            box-shadow: var(--card-shadow);
        }
        .chord-root-btn:hover {
            background: var(--surface-s);
            border-color: rgba(var(--accent-rgb), 0.3);
        }
        .chord-root-btn.active {
            background: var(--accent);
            border-color: transparent;
            color: var(--accent-ink);
            box-shadow: var(--accent-shadow);
        }

        /* Type chips */
        .chord-type-row { display: flex; gap: 7px; flex-wrap: wrap; }
        .chord-type-chip {
            padding: 9px 16px; border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink-dim);
            font-family: var(--font-head);
            font-weight: 700; font-size: 13px;
            cursor: pointer; min-height: 40px;
            transition: all 0.15s;
        }
        .chord-type-chip:hover {
            border-color: rgba(var(--accent-rgb), 0.4);
            color: var(--ink);
        }
        .chord-type-chip.active {
            background: rgba(var(--accent-rgb), 0.18);
            border-color: rgba(var(--accent-rgb), 0.4);
            color: var(--accent);
        }
    </style>

<script src="../../shared/audio-utils.js"></script>
<script>
// ─────────────────────────────────────────────
// CONSTANTES
// ─────────────────────────────────────────────
const NOTE_EN = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_ES = ['Do','Do#','Re','Re#','Mi','Fa','Fa#','Sol','Sol#','La','La#','Si'];

// MIDI de cuerdas al aire: E2, A2, D3, G3, B3, E4
const OPEN_MIDI = [40, 45, 50, 55, 59, 64];

const CHORD_INTERVALS = {
    major: [0,4,7],
    minor: [0,3,7],
    '7':   [0,4,7,10],
    m7:    [0,3,7,10],
    maj7:  [0,4,7,11],
    sus2:  [0,2,7],
    sus4:  [0,5,7],
    dim:   [0,3,6],
    aug:   [0,4,8],
};

const TYPE_LABELS = {
    major:'mayor', minor:'menor', '7':'7ª', m7:'m7', maj7:'maj7',
    sus2:'sus2', sus4:'sus4', dim:'dim', aug:'aug+'
};

// ─────────────────────────────────────────────
// DATOS DE ACORDES
// frets: [str6(LowE), str5(A), str4(D), str3(G), str2(B), str1(highE)]
// -1=muda, 0=al aire, n=traste
// barre: {fret, from, to} (índices de cuerda 0-5)
// ─────────────────────────────────────────────
const SHAPES = {
    // ── MAYOR ──
    'C_major':   {frets:[-1,3,2,0,1,0], baseFret:1, barre:null},
    'D_major':   {frets:[-1,-1,0,2,3,2], baseFret:1, barre:null},
    'E_major':   {frets:[0,2,2,1,0,0],  baseFret:1, barre:null},
    'F_major':   {frets:[1,3,3,2,1,1],  baseFret:1, barre:{fret:1,from:0,to:5}},
    'G_major':   {frets:[3,2,0,0,0,3],  baseFret:1, barre:null},
    'A_major':   {frets:[-1,0,2,2,2,0], baseFret:1, barre:null},
    'B_major':   {frets:[-1,2,4,4,4,2], baseFret:2, barre:{fret:2,from:1,to:5}},
    // ── MENOR ──
    'C_minor':   {frets:[-1,3,5,5,4,3], baseFret:3, barre:{fret:3,from:1,to:5}},
    'D_minor':   {frets:[-1,-1,0,2,3,1], baseFret:1, barre:null},
    'E_minor':   {frets:[0,2,2,0,0,0],  baseFret:1, barre:null},
    'F_minor':   {frets:[1,3,3,1,1,1],  baseFret:1, barre:{fret:1,from:0,to:5}},
    'G_minor':   {frets:[3,5,5,3,3,3],  baseFret:3, barre:{fret:3,from:0,to:5}},
    'A_minor':   {frets:[-1,0,2,2,1,0], baseFret:1, barre:null},
    'B_minor':   {frets:[-1,2,4,4,3,2], baseFret:2, barre:{fret:2,from:1,to:5}},
    // ── 7ª DOMINANTE ──
    'C_7':       {frets:[-1,3,2,3,1,0], baseFret:1, barre:null},
    'D_7':       {frets:[-1,-1,0,2,1,2], baseFret:1, barre:null},
    'E_7':       {frets:[0,2,0,1,0,0],  baseFret:1, barre:null},
    'F_7':       {frets:[1,3,1,2,1,1],  baseFret:1, barre:{fret:1,from:0,to:5}},
    'G_7':       {frets:[3,2,0,0,0,1],  baseFret:1, barre:null},
    'A_7':       {frets:[-1,0,2,0,2,0], baseFret:1, barre:null},
    'B_7':       {frets:[-1,2,1,2,0,2], baseFret:1, barre:null},
    // ── m7 ──
    'A_m7':      {frets:[-1,0,2,0,1,0], baseFret:1, barre:null},
    'D_m7':      {frets:[-1,-1,0,2,1,1], baseFret:1, barre:null},
    'E_m7':      {frets:[0,2,0,0,0,0],  baseFret:1, barre:null},
    'G_m7':      {frets:[3,5,3,3,3,3],  baseFret:3, barre:{fret:3,from:0,to:5}},
    'B_m7':      {frets:[-1,2,4,2,3,2], baseFret:2, barre:{fret:2,from:1,to:5}},
    'C_m7':      {frets:[-1,3,5,3,4,3], baseFret:3, barre:{fret:3,from:1,to:5}},
    'F_m7':      {frets:[1,3,1,1,1,1],  baseFret:1, barre:{fret:1,from:0,to:5}},
    // ── Maj7 ──
    'C_maj7':    {frets:[-1,3,2,0,0,0], baseFret:1, barre:null},
    'D_maj7':    {frets:[-1,-1,0,2,2,2], baseFret:1, barre:null},
    'E_maj7':    {frets:[0,2,1,1,0,0],  baseFret:1, barre:null},
    'G_maj7':    {frets:[3,2,0,0,0,2],  baseFret:1, barre:null},
    'A_maj7':    {frets:[-1,0,2,1,2,0], baseFret:1, barre:null},
    'F_maj7':    {frets:[1,3,3,2,1,0],  baseFret:1, barre:{fret:1,from:0,to:4}},
    // ── Sus2 ──
    'A_sus2':    {frets:[-1,0,2,2,0,0], baseFret:1, barre:null},
    'D_sus2':    {frets:[-1,-1,0,2,3,0], baseFret:1, barre:null},
    'E_sus2':    {frets:[0,2,4,4,0,0],  baseFret:1, barre:null},
    'G_sus2':    {frets:[3,0,0,0,3,3],  baseFret:1, barre:null},
    // ── Sus4 ──
    'A_sus4':    {frets:[-1,0,2,2,3,0], baseFret:1, barre:null},
    'D_sus4':    {frets:[-1,-1,0,2,3,3], baseFret:1, barre:null},
    'E_sus4':    {frets:[0,2,2,2,0,0],  baseFret:1, barre:null},
    'G_sus4':    {frets:[3,3,0,0,1,3],  baseFret:1, barre:null},
    // ── Dim ──
    'A_dim':     {frets:[-1,0,1,2,1,-1], baseFret:1, barre:null},
    'B_dim':     {frets:[-1,2,3,4,3,-1], baseFret:2, barre:null},
    'C_dim':     {frets:[-1,3,4,5,4,3],  baseFret:3, barre:{fret:3,from:1,to:5}},
    'D_dim':     {frets:[-1,-1,0,1,0,1], baseFret:1, barre:null},
    'E_dim':     {frets:[0,1,2,3,2,-1],  baseFret:1, barre:null},
    'F_dim':     {frets:[1,2,3,4,3,1],   baseFret:1, barre:{fret:1,from:0,to:5}},
    'G_dim':     {frets:[3,4,5,6,5,3],   baseFret:3, barre:{fret:3,from:0,to:5}},
    // ── Aug ──
    'C_aug':     {frets:[-1,3,2,1,1,0],  baseFret:1, barre:null},
    'D_aug':     {frets:[-1,-1,0,3,3,2], baseFret:1, barre:null},
    'E_aug':     {frets:[0,3,2,1,1,0],   baseFret:1, barre:null},
    'F_aug':     {frets:[1,4,3,2,2,1],   baseFret:1, barre:{fret:1,from:0,to:5}},
    'G_aug':     {frets:[3,2,1,0,0,3],   baseFret:1, barre:null},
    'A_aug':     {frets:[-1,0,3,2,2,1],  baseFret:1, barre:null},
};

// ─────────────────────────────────────────────
// GENERADOR DE CEJILLA (para acordes sin forma predefinida)
// ─────────────────────────────────────────────
function buildBarreShape(rootIdx, type) {
    // Fret para forma-E (raíz en cuerda 6, E2=4)
    const eFret = ((rootIdx - 4) % 12 + 12) % 12 || 12;
    // Fret para forma-A (raíz en cuerda 5, A2=9)
    const aFret = ((rootIdx - 9) % 12 + 12) % 12 || 12;

    const useE = eFret <= aFret;
    const f    = useE ? eFret : aFret;

    if (useE) {
        const shapes = {
            major: [f, f+2, f+2, f+1, f,   f  ],
            minor: [f, f+2, f+2, f,   f,   f  ],
            '7':   [f, f+2, f,   f+1, f,   f  ],
            m7:    [f, f+2, f,   f,   f,   f  ],
            maj7:  [f, f+2, f+1, f+1, f,   f  ],
            sus2:  [f, f+2, f+2, f-1>=0?f-1:f, f, f],
            sus4:  [f, f+2, f+2, f+2, f,   f  ],
            dim:   [f, f+1, f+2, f+3, f+2, f+1],
            aug:   [f, f+3, f+2, f+1, f+1, f  ],
        };
        return { frets: shapes[type] || shapes.major, baseFret: f, barre:{fret:f,from:0,to:5} };
    } else {
        const shapes = {
            major: [-1, f, f+2, f+2, f+2, f  ],
            minor: [-1, f, f+2, f+2, f+1, f  ],
            '7':   [-1, f, f+2, f,   f+2, f  ],
            m7:    [-1, f, f+2, f,   f+1, f  ],
            maj7:  [-1, f, f+2, f+1, f+2, f  ],
            sus2:  [-1, f, f+2, f+2, f-1>=0?f-1:f, f],
            sus4:  [-1, f, f+2, f+3, f+2, f  ],
            dim:   [-1, f, f+1, f+2, f+1, f  ],
            aug:   [-1, f, f+3, f+2, f+2, f+1],
        };
        return { frets: shapes[type] || shapes.major, baseFret: f, barre:{fret:f,from:1,to:5} };
    }
}

function getShape(rootIdx, type) {
    const key = NOTE_EN[rootIdx] + '_' + type;
    return SHAPES[key] || buildBarreShape(rootIdx, type);
}

// ─────────────────────────────────────────────
// ESTADO
// ─────────────────────────────────────────────
let rootIdx = 9; // La / A
let chordType = 'minor';

// ─────────────────────────────────────────────
// AUDIO — acoustic_guitar_nylon via soundfont-player
// ─────────────────────────────────────────────
let guitarInst = null;

async function initAudio() {
    if (guitarInst) return;
    guitarInst = await soundEngine.get('acoustic_guitar_nylon');
}

function midiToNoteName(midi) {
    return NOTE_EN[midi % 12] + (Math.floor(midi / 12) - 1);
}

async function strumChord() {
    await initAudio();

    const shape = getShape(rootIdx, chordType);
    const btn   = document.getElementById('strumBtn');
    btn.classList.add('strumming');
    setTimeout(() => btn.classList.remove('strumming'), 260);

    // Rasgueado: delay escalonado de 42 ms entre cuerdas (bajo → agudo)
    const now = soundEngine.now;
    shape.frets.forEach((fret, s) => {
        if (fret < 0) return;
        const note  = midiToNoteName(OPEN_MIDI[s] + fret);
        const delay = s * 0.042;
        guitarInst.play(note, now + delay, { duration: 2.5, gain: 0.85 });
    });
}

// ─────────────────────────────────────────────
// CANVAS — DIAGRAMA DE ACORDE
// Canvas 250×270 con más margen para evitar solapamiento en cejillas
// ─────────────────────────────────────────────
const CANVAS_W   = 250;
const CANVAS_H   = 270;
const STR_LEFT   = 32;          // margen izquierdo
const STR_RIGHT  = 210;         // límite derecho de cuerdas
const NUT_Y      = 62;          // posición Y de la cejuela
const FRET_H     = 42;          // alto por traste (más espacio → sin solapamiento)
const FRET_COUNT = 4;           // trastes visibles
const STR_GAP    = (STR_RIGHT - STR_LEFT) / 5;  // 6 cuerdas → 5 gaps = 35.6 px
const MARKER_Y   = 36;          // Y de los marcadores X/O (más separado de la cejuela)
const DOT_R      = 11;          // radio de los puntos de dedos

function strX(s) { return STR_LEFT + s * STR_GAP; }
function fretLineY(f) { return NUT_Y + f * FRET_H; }
function dotCenterY(f) { return fretLineY(f - 1) + FRET_H / 2; }

function getCanvasTheme() {
    const s = getComputedStyle(document.documentElement);
    const accent = s.getPropertyValue('--accent').trim() || '#9d6bff';
    const ink    = s.getPropertyValue('--ink').trim()    || '#eef0ff';
    const muted  = s.getPropertyValue('--muted').trim()  || 'rgba(238,240,255,0.42)';
    const kind   = s.getPropertyValue('--theme-kind').trim() || 'dark';
    return {
        accent, ink, muted, kind,
        bg:        kind === 'light' ? 'rgba(26,26,26,0.03)' : 'rgba(255,255,255,0.03)',
        nut:       kind === 'light' ? '#1a1a1a' : ink,
        nutFaded:  kind === 'light' ? 'rgba(26,26,26,0.2)' : 'rgba(255,255,255,0.2)',
        fretLine:  kind === 'light' ? 'rgba(26,26,26,0.1)' : 'rgba(255,255,255,0.12)',
        strings:   kind === 'light' ? 'rgba(26,26,26,0.3)' : 'rgba(255,255,255,0.3)',
        labelFill: kind === 'light' ? 'rgba(26,26,26,0.6)' : 'rgba(238,240,255,0.6)',
        xColor:    kind === 'light' ? '#c73c3c' : '#ff5b7f',
        oColor:    kind === 'light' ? 'rgba(26,26,26,0.7)' : 'rgba(238,240,255,0.7)',
        strLabel:  kind === 'light' ? 'rgba(26,26,26,0.4)' : 'rgba(238,240,255,0.4)',
    };
}

// Redraw on theme change
window.addEventListener('mt-theme-change', function() { if (typeof update === 'function') update(); });

function drawDiagram(shape) {
    const canvas = document.getElementById('chordCanvas');
    const ctx    = canvas.getContext('2d');
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    const { frets, baseFret, barre } = shape;
    const T = getCanvasTheme();

    // Fondo
    ctx.fillStyle = T.bg;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // ── Etiqueta de posición (trastes altos) ──
    if (baseFret > 1) {
        ctx.fillStyle = T.labelFill;
        ctx.font = 'bold 13px Inter, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(baseFret + 'fr', STR_RIGHT + 8, NUT_Y + FRET_H / 2);
    }

    // ── Cejuela (gruesa) o primera línea de traste (delgada) ──
    ctx.strokeStyle = baseFret === 1 ? T.nut : T.nutFaded;
    ctx.lineWidth   = baseFret === 1 ? 7 : 1.5;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(strX(0), NUT_Y);
    ctx.lineTo(strX(5), NUT_Y);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // ── Líneas de trastes ──
    ctx.strokeStyle = T.fretLine;
    ctx.lineWidth   = 1;
    for (let f = 1; f <= FRET_COUNT; f++) {
        ctx.beginPath();
        ctx.moveTo(strX(0), fretLineY(f));
        ctx.lineTo(strX(5), fretLineY(f));
        ctx.stroke();
    }

    // ── Cuerdas (verticales) ──
    for (let s = 0; s < 6; s++) {
        // Grosor progresivo: cuerda 0 (Mi grave) más gruesa
        ctx.strokeStyle = T.strings;
        ctx.lineWidth   = 1 + (5 - s) * 0.18;
        ctx.beginPath();
        ctx.moveTo(strX(s), NUT_Y);
        ctx.lineTo(strX(s), fretLineY(FRET_COUNT));
        ctx.stroke();
    }

    // ── Cejilla (barre) ──
    if (barre) {
        const relFret = barre.fret - baseFret + 1;
        if (relFret >= 1 && relFret <= FRET_COUNT) {
            const by  = dotCenterY(relFret);
            const bx1 = strX(barre.from);
            const bx2 = strX(barre.to);
            // Barra redondeada con más grosor (DOT_R * 2 de alto = mismo que puntos)
            const barH = DOT_R * 2;
            ctx.fillStyle = T.accent;
            ctx.beginPath();
            ctx.roundRect(bx1 - DOT_R * 0.7, by - DOT_R, (bx2 - bx1) + DOT_R * 1.4, barH, DOT_R);
            ctx.fill();
        }
    }

    // ── Puntos de dedos y marcadores X / O ──
    frets.forEach((fret, s) => {
        const x = strX(s);

        if (fret === -1) {
            // X — cuerda muda
            ctx.strokeStyle = T.xColor;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x - 7, MARKER_Y - 7); ctx.lineTo(x + 7, MARKER_Y + 7);
            ctx.moveTo(x + 7, MARKER_Y - 7); ctx.lineTo(x - 7, MARKER_Y + 7);
            ctx.stroke();
            ctx.lineCap = 'butt';

        } else if (fret === 0) {
            // O — cuerda al aire
            ctx.strokeStyle = T.oColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, MARKER_Y, 8, 0, Math.PI * 2);
            ctx.stroke();

        } else {
            const relFret = fret - baseFret + 1;
            if (relFret < 1 || relFret > FRET_COUNT) return;
            // Si está cubierto por la cejilla, no dibujar punto individual
            if (barre && fret === barre.fret && s >= barre.from && s <= barre.to) return;

            const dy = dotCenterY(relFret);
            ctx.fillStyle = T.accent;
            ctx.beginPath();
            ctx.arc(x, dy, DOT_R, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // ── Etiquetas de cuerdas ──
    const STRING_NAMES = ['E', 'A', 'D', 'G', 'B', 'e'];
    ctx.fillStyle = T.strLabel;
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    STRING_NAMES.forEach((n, s) => ctx.fillText(n, strX(s), fretLineY(FRET_COUNT) + 10));
}

// ─────────────────────────────────────────────
// RENDERIZADO DE UI
// ─────────────────────────────────────────────
function renderRootGrid() {
    document.getElementById('rootGrid').innerHTML = NOTE_ES.map((name, i) =>
        `<button class="chord-root-btn${i === rootIdx ? ' active' : ''}" onclick="selectRoot(${i})">${name}</button>`
    ).join('');
}

function selectRoot(i) {
    rootIdx = i;
    document.querySelectorAll('.chord-root-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.chord-root-btn')[i].classList.add('active');
    update();
}

function setType(type, btn) {
    chordType = type;
    document.querySelectorAll('.chord-type-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    update();
}

async function arpeggioChord() {
    await initAudio();
    const shape = getShape(rootIdx, chordType);
    const btn   = document.getElementById('arpBtn');
    btn.classList.add('playing');
    const now = soundEngine.now;
    let delay = 0;
    shape.frets.forEach((fret, s) => {
        if (fret < 0) return;
        const note = midiToNoteName(OPEN_MIDI[s] + fret);
        guitarInst.play(note, now + delay, { duration: 1.8, gain: 0.85 });
        delay += 0.18;
    });
    setTimeout(() => btn.classList.remove('playing'), delay * 1000 + 500);
}

function update() {
    const shape     = getShape(rootIdx, chordType);
    const intervals = CHORD_INTERVALS[chordType];
    const noteNames = intervals.map(i => NOTE_ES[(rootIdx + i) % 12]);

    const suffix = { minor:'m','7':'7',m7:'m7',maj7:'maj7',sus2:'sus2',sus4:'sus4',dim:'°',aug:'+' }[chordType] || '';

    // Hero header
    document.getElementById('dispName').textContent = NOTE_EN[rootIdx];
    document.getElementById('dispType').textContent = suffix;
    document.getElementById('dispNotes').textContent = `${TYPE_LABELS[chordType]} · ${noteNames.join(' · ')}`;

    // Note pills
    const pillsEl = document.getElementById('notePills');
    pillsEl.innerHTML = noteNames.map((n, i) =>
        `<div class="chord-note-pill${i === 0 ? ' root' : ''}">${n}</div>`
    ).join('');

    drawDiagram(shape);
}

</script>
<script src="../../shared/shell.js"></script>
<script>
window.addEventListener('load', function() {
    renderRootGrid();
    update();
});
</script>
